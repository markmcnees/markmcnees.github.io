<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>South Walton — Fans</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;900&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --red:#005B34;--red-dark:#004526;--gold:#d4a843;
  --cream:#f7f4f0;--white:#ffffff;--black:#0a0a0a;
  --charcoal:#1a1a2e;
  --gray:#888;--gray-light:#bbb;--gray-lighter:#e5e5e5;
  --green:#16a34a;--green-bg:#dcfce7;
  --loss-red:#dc2626;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--cream);color:var(--black);min-height:100vh;overflow-x:hidden;}

/* HERO */
.hero{background:var(--charcoal);position:relative;overflow:hidden;}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 50%,rgba(0,91,52,.25) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 80% 30%,rgba(212,168,67,.15) 0%,transparent 60%),linear-gradient(135deg,#0a0a1a 0%,#1a1a2e 50%,#0f0f1f 100%);}
.hero-pattern{position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.015) 0,rgba(255,255,255,.015) 1px,transparent 1px,transparent 40px),repeating-linear-gradient(-45deg,rgba(255,255,255,.015) 0,rgba(255,255,255,.015) 1px,transparent 1px,transparent 40px);}
.hero-content{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;padding:20px 20px 16px;gap:12px;}
.hero-left{display:flex;align-items:center;gap:14px;}
.crown-icon{font-size:36px;filter:drop-shadow(0 0 12px rgba(212,168,67,.6));}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:#fff;line-height:1;}
.hero-sub{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:3px;font-weight:700;color:var(--gold);text-transform:uppercase;margin-top:2px;}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(0,91,52,.2);border:1px solid rgba(0,91,52,.4);padding:6px 12px;border-radius:20px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1.5px;color:#ff6b6b;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#ff4444;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}
.sync-status{font-size:11px;color:var(--gray);margin-top:4px;}

/* RECORD STRIP */
.record-strip{background:var(--red);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.record-main{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:#fff;line-height:1;}
.record-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;margin-bottom:2px;}
.record-stats{display:flex;gap:20px;}
.record-stat{text-align:center;}
.record-stat-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#fff;}
.record-stat-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1.5px;color:rgba(255,255,255,.6);font-weight:700;}

/* SECTIONS */
.section{padding:16px 16px 0;}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--charcoal);display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--red);}

/* TODAY'S DUAL */
.dual-header{background:linear-gradient(135deg,var(--charcoal) 0%,#2d2d4e 100%);padding:16px;display:flex;align-items:center;justify-content:space-between;border-radius:var(--radius) var(--radius) 0 0;}
.dual-matchup{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:#fff;}
.dual-meta-line{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1.5px;font-weight:700;color:var(--gold);margin-top:2px;}
.dual-score-badge{text-align:right;}
.dual-score-num{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:2px;color:#fff;line-height:1;}
.dual-score-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.55);font-weight:700;}

/* COURT CARDS */
.courts-grid{padding:12px;display:flex;flex-direction:column;gap:10px;}
.court-card{background:#fff;border-radius:10px;border:1px solid var(--gray-lighter);box-shadow:0 1px 6px rgba(0,0,0,.05);overflow:hidden;}
.court-card.live{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.2);}
.court-card.won{border-color:var(--green);}
.court-card.lost{border-color:var(--loss-red);}
.court-card-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--cream);}
.ct-badge{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;padding:3px 8px;border-radius:4px;min-width:36px;text-align:center;flex-shrink:0;}
.ct-1{background:#fde2e8;color:var(--red-dark);}.ct-2{background:#e0e7ff;color:#3730a3;}.ct-3{background:#fef3c7;color:#92400e;}.ct-4{background:#d1fae5;color:#065f46;}.ct-5{background:#f3e8ff;color:#6b21a8;}.ct-6{background:#fce7f3;color:#9d174d;}.ct-7{background:#ecfdf5;color:#065f46;}.ct-8{background:#fffbeb;color:#92400e;}
.court-pair-name{flex:1;font-weight:700;font-size:14px;color:var(--charcoal);}
.court-pair-opp{font-size:11px;color:var(--gray);font-weight:400;}
.court-match-rec{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;}
.court-match-rec.win{color:var(--green);}
.court-match-rec.loss{color:var(--loss-red);}
.court-match-rec.pending{color:var(--gray-light);font-size:14px;}
.court-sets{padding:6px 14px 10px;display:flex;flex-wrap:wrap;gap:6px;}
.set-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.5px;}
.set-pill.w{background:var(--green-bg);color:var(--green);}
.set-pill.l{background:#fee2e2;color:var(--loss-red);}
.set-pill.live-set{background:#dbeafe;color:#1d4ed8;animation:setpulse 1.5s infinite;}
@keyframes setpulse{0%,100%{opacity:1;}50%{opacity:.6;}}
.exhib-label{font-size:10px;font-weight:800;color:var(--gray);letter-spacing:1.5px;padding:6px 14px 2px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;}

/* SCHEDULE */
.sched-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-lighter);}
.sched-row:last-child{border-bottom:none;}
.sched-date{min-width:58px;font-size:12px;color:var(--gray);font-weight:600;}
.sched-opp{flex:1;font-weight:700;font-size:14px;}
.sched-loc{font-size:11px;color:var(--gray);font-weight:400;}
.sched-score{font-family:'Bebas Neue',sans-serif;font-size:18px;text-align:right;}
.sched-score.w{color:var(--green);}.sched-score.l{color:var(--loss-red);}.sched-score.upcoming{color:var(--gray-light);font-size:12px;font-family:'Barlow',sans-serif;font-style:italic;}

/* UTIL */
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;}
.no-game{background:#fff;border-radius:var(--radius);padding:28px 20px;text-align:center;box-shadow:var(--shadow);margin-bottom:12px;}
.no-game-icon{font-size:36px;margin-bottom:8px;}
.no-game-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;color:var(--charcoal);}
.no-game-sub{font-size:13px;color:var(--gray);margin-top:4px;}
.footer{padding:20px 16px 32px;text-align:center;}
.footer-logo{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--gray);}
.footer-sub{font-size:11px;color:var(--gray-light);margin-top:4px;}
.back-btn{display:inline-flex;align-items:center;gap:6px;margin-top:14px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1.5px;color:#fff;text-decoration:none;padding:9px 20px;border-radius:8px;background:var(--red);transition:background .2s;}
.back-btn:hover{background:var(--red-dark);}
.loading{display:flex;flex-direction:column;align-items:center;padding:30px;gap:10px;}
.spinner{width:28px;height:28px;border:3px solid var(--gray-lighter);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1.5px;color:var(--gray);}
@media(max-width:400px){.hero-title{font-size:22px;}.record-main{font-size:26px;}.dual-score-num{font-size:32px;}}
</style>
</head>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script>
const FB_CONFIG={apiKey:"AIzaSyC8Ue06XPvGXo1XTloewPvDRBWtK5tDAj8",authDomain:"leon-beach-volleyball.firebaseapp.com",databaseURL:"https://leon-beach-volleyball-default-rtdb.firebaseio.com",projectId:"leon-beach-volleyball",storageBucket:"leon-beach-volleyball.firebasestorage.app",messagingSenderId:"937804799976",appId:"1:937804799976:web:02121e68655b4febeb8e5d"};
const DB_ROOT='south_walton_matches';
firebase.initializeApp(FB_CONFIG);
const db=firebase.database();
let D={players:[],gamedays:[],scrimmages:[],assignments:{},schedule:[]};

function td(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fD(s){if(!s)return'';return new Date(s+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function pN(id){
  const p=D.players.find(x=>x.id===id);
  if(!p)return'?';
  return D.players.filter(x=>x.firstName===p.firstName).length>1?p.firstName+' '+p.lastName.charAt(0)+'.':p.firstName;
}
function pairKey(p1,p2){return[p1,p2].filter(Boolean).sort().join('|');}
function findMatch(list,date,p1,p2){return list.find(m=>m.date===date&&m.pair&&pairKey(...(m.pair||[]))==pairKey(p1,p2));}

// Live updates every 15s
db.ref('.info/connected').on('value',s=>{
  document.getElementById('sync-status').textContent=s.val()?'Live updates on':'Offline';
});

db.ref(DB_ROOT).on('value',snap=>{
  const val=snap.val()||{};
  D.players=val.players?Object.values(val.players):[];
  D.gamedays=val.gamedays?Object.values(val.gamedays):[];
  D.scrimmages=val.scrimmages?Object.values(val.scrimmages):[];
  D.assignments=val.assignments||{};
  D.schedule=val.schedule?Object.values(val.schedule):[];
  render();
});

function render(){renderRecord();renderToday();renderSchedule();}

// ── SEASON RECORD ──
function renderRecord(){
  let dualW=0,dualL=0,courtW=0,courtL=0,setW=0,setL=0;
  D.schedule.forEach(g=>{
    if(g.scoreUs!=null&&g.scoreThem!=null&&g.scoreUs!==''&&g.scoreThem!==''){
      parseInt(g.scoreUs)>parseInt(g.scoreThem)?dualW++:dualL++;
    }
  });
  D.gamedays.forEach(m=>{
    if((m.court||0)>=6||m.isExhibition)return;
    const sets=m.sets||[];
    const sw=sets.filter(s=>(s.scoreUs||0)>(s.scoreThem||0)).length;
    const sl=sets.filter(s=>(s.scoreThem||0)>(s.scoreUs||0)).length;
    sets.forEach(s=>{(s.scoreUs||0)>(s.scoreThem||0)?setW++:setL++;});
    if(sw>sl)courtW++;else if(sl>sw)courtL++;
  });
  document.getElementById('record-main').textContent=dualW+'-'+dualL;
  document.getElementById('record-stats').innerHTML='';
  // Today's dual score in strip
  const today=td();
  const assignment=Object.values(D.assignments).find(a=>a.date===today);
  const todayStrip=document.getElementById('today-strip');
  if(assignment){
    const opp=assignment.opponent||'Opponent';
    const matchList=assignment.type==='scrimmage'?D.scrimmages:D.gamedays;
    const courts=(assignment.courts||[]).filter(c=>(c.court||0)<6);
    let lc=0,oc=0;
    courts.forEach(c=>{
      const m=findMatch(matchList,today,c.p1,c.p2);
      if(!m||!(m.sets||[]).length)return;
      const sw=(m.sets||[]).filter(s=>(s.scoreUs||0)>(s.scoreThem||0)).length;
      const sl=(m.sets||[]).filter(s=>(s.scoreThem||0)>(s.scoreUs||0)).length;
      if(sw>=2)lc++;else if(sl>=2)oc++;
    });
    const hasScores=courts.some(c=>{const m=findMatch(matchList,today,c.p1,c.p2);return m&&(m.sets||[]).length>0;});
    document.getElementById('today-strip-label').textContent='Today vs '+opp;
    document.getElementById('today-strip-score').textContent=hasScores?(lc+'–'+oc):'—';
    if(todayStrip)todayStrip.style.display='block';
  }else{
    if(todayStrip)todayStrip.style.display='none';
  }
}

// ── TODAY'S DUAL ──
function renderToday(){
  const today=td();
  const container=document.getElementById('today-container');
  const assignment=Object.values(D.assignments).find(a=>a.date===today);

  if(!assignment){
    const sched=D.schedule.find(s=>s.date===today);
    container.innerHTML=sched
      ?`<div class="no-game"><div class="no-game-icon">🏐</div><div class="no-game-title">Dual Day vs ${sched.opponent}</div><div class="no-game-sub">Lineup posting soon — check back!</div></div>`
      :`<div class="no-game"><div class="no-game-icon">🏖️</div><div class="no-game-title">No Dual Today</div><div class="no-game-sub">See the Season Schedule below for upcoming duals.</div></div>`;
    return;
  }

  const opp=assignment.opponent||'Opponent';
  const isScrimmage=assignment.type==='scrimmage';
  const matchList=isScrimmage?D.scrimmages:D.gamedays;
  const courts=(assignment.courts||[]).sort((a,b)=>(a.court||0)-(b.court||0));

  // Tally scored courts (non-exhibition, courts 1-5)
  let swCourts=0,oppCourts=0;
  courts.forEach(c=>{
    if((c.court||0)>=6)return;
    const m=findMatch(matchList,today,c.p1,c.p2);
    if(!m||!(m.sets||[]).length)return;
    const sw=(m.sets||[]).filter(s=>(s.scoreUs||0)>(s.scoreThem||0)).length;
    const sl=(m.sets||[]).filter(s=>(s.scoreThem||0)>(s.scoreUs||0)).length;
    if(sw>=2)swCourts++;
    else if(sl>=2)oppCourts++;
  });

  const hasAnyScores=courts.some(c=>{
    const m=findMatch(matchList,today,c.p1,c.p2);
    return m&&(m.sets||[]).length>0;
  });

  // Build court cards
  const scoredCourts=courts.filter(c=>(c.court||0)<6);
  const exhibCourts=courts.filter(c=>(c.court||0)>=6);

  function buildCourtCard(c){
    const m=findMatch(matchList,today,c.p1,c.p2);
    const sets=m?m.sets||[]:[];
    const sw=sets.filter(s=>(s.scoreUs||0)>(s.scoreThem||0)).length;
    const sl=sets.filter(s=>(s.scoreThem||0)>(s.scoreUs||0)).length;
    const matchDone=sw>=2||sl>=2;
    const isLive=sets.length>0&&!matchDone;
    const cardClass=sw>=2?'won':sl>=2?'lost':isLive?'live':'';

    // Set pills — all recorded sets shown, in-progress set gets live style
    const setPills=sets.map((s,i)=>{
      const w=(s.scoreUs||0)>(s.scoreThem||0);
      const l=(s.scoreThem||0)>(s.scoreUs||0);
      // Last set that's not conclusive = live
      const liveSet=!w&&!l;
      return`<span class="set-pill ${liveSet?'live-set':w?'w':'l'}">S${i+1} ${s.scoreUs}–${s.scoreThem}</span>`;
    }).join('');

    const recStr=sets.length?`${sw}–${sl}`:'–';
    const recClass=sw>sl?'win':sl>sw?'loss':'pending';

    return`<div class="court-card ${cardClass}">
      <div class="court-card-header">
        <span class="ct-badge ct-${c.court}">CT${c.court}</span>
        <div class="court-pair-name">${pN(c.p1)} &amp; ${pN(c.p2)}<div class="court-pair-opp">vs ${opp}</div></div>
        <div class="court-match-rec ${recClass}">${recStr}</div>
      </div>
      ${sets.length?`<div class="court-sets">${setPills}</div>`:''}
    </div>`;
  }

  const scoredHTML=scoredCourts.map(buildCourtCard).join('');
  const exhibHTML=exhibCourts.length
    ?`<div class="exhib-label">Exhibition</div>${exhibCourts.map(buildCourtCard).join('')}`
    :'';

  // Header score: show dash until first score, then tally
  const headerScore=hasAnyScores
    ?`<div class="dual-score-badge">
        <div class="dual-score-num">${swCourts}–${oppCourts}</div>
        <div class="dual-score-lbl">COURTS WON</div>
      </div>`
    :`<div class="dual-score-badge">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:14px;color:rgba(255,255,255,.6);line-height:1.3;">STARTING<br>SOON</div>
      </div>`;

  container.innerHTML=`<div class="card" style="overflow:hidden;">
    <div class="dual-header">
      <div>
        <div class="dual-matchup">LEON vs ${opp.toUpperCase()}</div>
        <div class="dual-meta-line">${fD(today)} · ${isScrimmage?'SCRIMMAGE':'DUAL'}</div>
      </div>
      ${headerScore}
    </div>
    <div class="courts-grid">
      ${scoredHTML}${exhibHTML}
      ${!courts.length?'<div style="text-align:center;padding:16px;color:var(--gray);font-size:13px;">Lineup loading...</div>':''}
    </div>
  </div>`;
}

// ── SEASON SCHEDULE (mirrors coach dashboard) ──
function renderSchedule(){
  const container=document.getElementById('schedule-container');
  const games=[...D.schedule].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  if(!games.length){container.innerHTML='<div style="padding:16px;text-align:center;color:var(--gray);font-size:13px;">Schedule coming soon.</div>';return;}
  const today=td();
  let wins=0,losses=0;
  games.forEach(g=>{if(g.scoreUs!=null&&g.scoreThem!=null&&g.scoreUs!==''&&g.scoreThem!==''){parseInt(g.scoreUs)>parseInt(g.scoreThem)?wins++:losses++;}});
  let h=`<div style="display:flex;gap:12px;margin-bottom:14px;padding-top:6px;">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--green);">${wins}-${losses}</div>
    <div style="font-size:12px;color:var(--gray);align-self:center;">Season Record</div>
  </div>`;
  games.forEach(g=>{
    const played=g.scoreUs!=null&&g.scoreThem!=null&&g.scoreUs!==''&&g.scoreThem!=='';
    const win=played&&parseInt(g.scoreUs)>parseInt(g.scoreThem);
    const upcoming=!played&&g.date>=today;
    const loc=g.location==='away'?'@':'vs';
    h+=`<div class="sched-row">
      <span class="sched-date">${fD(g.date)}</span>
      <div class="sched-opp"><span class="sched-loc">${loc} </span>${g.opponent||'TBD'}</div>
      <div>`;
    if(played){
      h+=`<div class="sched-score ${win?'w':'l'}">${g.scoreUs}–${g.scoreThem}</div>
          <div style="font-size:10px;font-weight:700;color:${win?'var(--green)':'var(--loss-red)'};text-align:right;">${win?'W':'L'}</div>`;
    }else{
      h+=`<div class="sched-score upcoming">${upcoming?'Upcoming':'—'}</div>`;
    }
    h+=`</div></div>`;
  });
  container.innerHTML=h;
}
</script>
</body>
</html>
